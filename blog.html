<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Jiya Khurana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0e; --surface: #0e1117; --surface2: #141820;
      --border: rgba(255,255,255,0.07); --border-bright: rgba(255,255,255,0.14);
      --ink: #e8eaf0; --muted2: #8890a0; --accent: #a78bfa; --accent2: #f472b6;
      --mono: "Space Mono", monospace; --sans: "Space Grotesk", system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--sans); font-weight: 400; font-size: 15px;
      line-height: 1.7; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); animation: drift 12s ease-in-out infinite alternate; }
    .orb-1 { width:420px; height:420px; top:-100px; right:-80px; background:rgba(167,139,250,0.07); animation-duration:14s; }
    .orb-2 { width:300px; height:300px; bottom:10%; left:-60px; background:rgba(244,114,182,0.06); animation-duration:10s; animation-delay:-4s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,40px) scale(1.1); } }
    nav, main, footer { position: relative; z-index: 1; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 5vw; background: rgba(8,10,14,0.85);
      backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); text-decoration: none; }
    .nav-logo span { color: var(--muted2); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted2); text-decoration: none;
      transition: color 0.2s; position: relative;
    }
    .nav-links a.active { color: var(--accent); }
    .nav-links a::after { content: ""; position: absolute; left:0; bottom:-2px; width:0; height:1px; background:var(--accent); transition:width 0.25s; }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a:hover { color: var(--ink); }
    .container { max-width: 820px; margin: 0 auto; padding: 0 5vw; }
    .page-header {
      padding: 10rem 0 4rem;
      border-bottom: 1px solid var(--border);
    }
    .eyebrow {
      font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .eyebrow::after { content:""; display:block; height:1px; width:40px; background:var(--accent); opacity:0.4; }
    h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 1rem; }
    .page-desc { color: var(--muted2); font-size: 0.95rem; max-width: 480px; }

    /* POST LIST */
    .post-list { padding: 4rem 0; display: flex; flex-direction: column; gap: 1px; }
    .post-card {
      display: block; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      padding: 1.75rem 2rem; transition: border-color 0.25s, background 0.25s;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(16px);
      animation: cardIn 0.5s ease forwards;
    }
    .post-card:nth-child(1) { animation-delay: 0.1s; }
    .post-card:nth-child(2) { animation-delay: 0.2s; }
    .post-card:nth-child(3) { animation-delay: 0.3s; }
    .post-card:nth-child(4) { animation-delay: 0.4s; }
    @keyframes cardIn { to { opacity:1; transform:none; } }
    .post-card::before {
      content: ""; position: absolute; left:0; top:0; bottom:0; width:2px;
      background: var(--accent); transform: scaleY(0); transform-origin: bottom;
      transition: transform 0.25s;
    }
    .post-card:hover { border-color: var(--border-bright); background: var(--surface2); }
    .post-card:hover::before { transform: scaleY(1); }
    .post-meta {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; flex-wrap: wrap;
    }
    .post-date { font-family: var(--mono); font-size: 0.68rem; color: var(--muted2); letter-spacing: 0.04em; }
    .post-tag {
      font-family: var(--mono); font-size: 0.62rem; padding: 0.12rem 0.5rem;
      border-radius: 2px; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .tag-devlog  { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25); color: var(--accent); }
    .tag-opinion { background: rgba(244,114,182,0.1); border: 1px solid rgba(244,114,182,0.25); color: var(--accent2); }
    .tag-personal{ background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.2); color: #6ee7b7; }
    .post-title { font-size: 1.05rem; font-weight: 600; color: var(--ink); margin-bottom: 0.4rem; transition: color 0.2s; }
    .post-card:hover .post-title { color: var(--accent); }
    .post-excerpt { font-size: 0.87rem; color: var(--muted2); line-height: 1.6; }
    .post-arrow { position: absolute; right: 2rem; top: 50%; transform: translateY(-50%); font-family: var(--mono); color: var(--muted2); font-size: 1rem; transition: color 0.2s, transform 0.2s; }
    .post-card:hover .post-arrow { color: var(--accent); transform: translateY(-50%) translateX(4px); }

    /* EMPTY STATE */
    .coming-soon {
      text-align: center; padding: 5rem 0;
      font-family: var(--mono); color: var(--muted2); font-size: 0.8rem; letter-spacing: 0.06em;
    }

    footer {
      text-align: center; padding: 1.75rem 5vw;
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--muted2); letter-spacing: 0.06em;
      border-top: 1px solid var(--border);
    }
    @media (max-width: 440px) { .nav-links { display: none; } }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav>
    <a href="index.html" class="nav-logo"><span>~/</span>jiya</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <div class="container">
        <p class="eyebrow">Blog</p>
        <h1>Thoughts &amp; devlogs</h1>
        <p class="page-desc">A mix of project write-ups, opinions on tech, and honest notes from life as a CS student. Updated whenever something's worth writing about.</p>
      </div>
    </div>

    <div class="container">
      <!-- POST LIST — paste a post card here when you're ready to publish -->

          <p class="post-excerpt">A short description of the post.</p>
          <span class="post-arrow">&#8599;</span>
        </a>
      </div>
      -->

      <div class="coming-soon">
        <p style="font-size:1.5rem; margin-bottom:0.75rem;">&#9998;</p>
        Posts coming soon.
      </div>
    </div>
  </main>

  <footer>&#169; 2026 &middot; jiya khurana &middot; built with care</footer>

</body>
</html>
